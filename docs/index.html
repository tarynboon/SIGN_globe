<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SIGN Globe</title>
    <style>
      html, body { margin:0; width:100%; height:100%; }
      #sign-globe { width:100%; height:100vh; }
    </style>
  </head>
  <body>
    <div id="sign-globe"></div>

    <script src="./sign-globe-widget.js"></script>
    <script>
      // If this throws, your widget isn't exporting the function name expected.
      SignGlobeBundle.mountSignGlobe({ containerId: "sign-globe", height: "100vh" });
    </script>
  </body>
</html>
